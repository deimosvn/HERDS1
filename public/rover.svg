<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <!-- Ground / terrain -->
  <ellipse cx="300" cy="360" rx="260" ry="18" fill="#D8F3DC" opacity="0.6"/>
  <ellipse cx="300" cy="360" rx="180" ry="10" fill="#B7E4C7" opacity="0.4"/>

  <!-- Shadow under rover -->
  <ellipse cx="300" cy="345" rx="140" ry="12" fill="#1A3C34" opacity="0.08"/>

  <!-- Rover body - main chassis -->
  <rect x="170" y="240" rx="16" ry="16" width="260" height="80" fill="url(#bodyGrad)" stroke="#1A3C34" stroke-width="2"/>
  
  <!-- Rover body - top section -->
  <rect x="200" y="200" rx="12" ry="12" width="200" height="50" fill="url(#topGrad)" stroke="#1A3C34" stroke-width="1.5"/>
  
  <!-- Sensor dome -->
  <ellipse cx="300" cy="200" rx="40" ry="15" fill="#48CAE4" opacity="0.3" stroke="#2C74B3" stroke-width="1.5"/>
  <ellipse cx="300" cy="196" rx="25" ry="8" fill="#90E0EF" opacity="0.5"/>
  
  <!-- Solar panel -->
  <rect x="215" y="175" rx="4" ry="4" width="170" height="28" fill="url(#solarGrad)" stroke="#0A2647" stroke-width="1"/>
  <!-- Solar panel lines -->
  <line x1="250" y1="175" x2="250" y2="203" stroke="#0A2647" stroke-width="0.5" opacity="0.4"/>
  <line x1="285" y1="175" x2="285" y2="203" stroke="#0A2647" stroke-width="0.5" opacity="0.4"/>
  <line x1="320" y1="175" x2="320" y2="203" stroke="#0A2647" stroke-width="0.5" opacity="0.4"/>
  <line x1="355" y1="175" x2="355" y2="203" stroke="#0A2647" stroke-width="0.5" opacity="0.4"/>
  
  <!-- LiDAR unit on top -->
  <rect x="285" y="162" rx="3" ry="3" width="30" height="16" fill="#374151" stroke="#1B1B1E" stroke-width="1"/>
  <circle cx="300" cy="162" r="4" fill="#52B788">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Camera / sensor array - left -->
  <rect x="175" y="255" rx="4" ry="4" width="24" height="18" fill="#144272" stroke="#0A2647" stroke-width="1"/>
  <circle cx="187" cy="264" r="5" fill="#48CAE4" opacity="0.8">
    <animate attributeName="r" values="5;6;5" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Camera / sensor array - right -->
  <rect x="401" y="255" rx="4" ry="4" width="24" height="18" fill="#144272" stroke="#0A2647" stroke-width="1"/>
  <circle cx="413" cy="264" r="5" fill="#48CAE4" opacity="0.8">
    <animate attributeName="r" values="5;6;5" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- Hydrogel dispenser -->
  <rect x="260" y="310" rx="6" ry="6" width="80" height="25" fill="#2D6A4F" stroke="#1A3C34" stroke-width="1.5"/>
  <circle cx="280" cy="340" r="3" fill="#52B788" opacity="0.7">
    <animate attributeName="cy" values="340;355;340" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="340" r="3" fill="#52B788" opacity="0.7">
    <animate attributeName="cy" values="340;358;340" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="320" cy="340" r="3" fill="#52B788" opacity="0.7">
    <animate attributeName="cy" values="340;352;340" dur="2.2s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  
  <!-- Wheels - left front -->
  <circle cx="210" cy="335" r="30" fill="#374151" stroke="#1B1B1E" stroke-width="2.5"/>
  <circle cx="210" cy="335" r="20" fill="#4B5563" stroke="#374151" stroke-width="1.5"/>
  <circle cx="210" cy="335" r="8" fill="#6B7280"/>
  <!-- Wheel treads -->
  <circle cx="210" cy="335" r="27" fill="none" stroke="#4B5563" stroke-width="5" stroke-dasharray="6 6">
    <animateTransform attributeName="transform" type="rotate" from="0 210 335" to="360 210 335" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Wheels - right front -->
  <circle cx="390" cy="335" r="30" fill="#374151" stroke="#1B1B1E" stroke-width="2.5"/>
  <circle cx="390" cy="335" r="20" fill="#4B5563" stroke="#374151" stroke-width="1.5"/>
  <circle cx="390" cy="335" r="8" fill="#6B7280"/>
  <circle cx="390" cy="335" r="27" fill="none" stroke="#4B5563" stroke-width="5" stroke-dasharray="6 6">
    <animateTransform attributeName="transform" type="rotate" from="0 390 335" to="360 390 335" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Antenna -->
  <line x1="380" y1="205" x2="395" y2="155" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <circle cx="395" cy="152" r="4" fill="#52B788">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Signal waves -->
  <path d="M400 145 Q408 140, 412 148" fill="none" stroke="#52B788" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M404 140 Q415 133, 420 145" fill="none" stroke="#52B788" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0;0.3;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </path>
  
  <!-- Herds-1 branding on rover -->
  <text x="300" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="16" fill="#FFFFFF" letter-spacing="2">HERDS-1</text>
  
  <!-- Small plants growing from dispensed hydrogel -->
  <g opacity="0.6">
    <line x1="140" y1="358" x2="140" y2="345" stroke="#40916C" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="136" cy="344" rx="4" ry="6" fill="#52B788" transform="rotate(-20 136 344)"/>
    <ellipse cx="145" cy="346" rx="3" ry="5" fill="#52B788" transform="rotate(15 145 346)"/>
  </g>
  <g opacity="0.4">
    <line x1="120" y1="360" x2="120" y2="350" stroke="#40916C" stroke-width="1" stroke-linecap="round"/>
    <ellipse cx="117" cy="349" rx="3" ry="4" fill="#52B788" transform="rotate(-15 117 349)"/>
  </g>
  <g opacity="0.5">
    <line x1="470" y1="357" x2="470" y2="342" stroke="#40916C" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="466" cy="341" rx="4" ry="6" fill="#52B788" transform="rotate(-20 466 341)"/>
    <ellipse cx="475" cy="343" rx="3" ry="5" fill="#52B788" transform="rotate(15 475 343)"/>
  </g>

  <!-- Water droplets in air -->
  <circle cx="480" cy="300" r="2.5" fill="#48CAE4" opacity="0.4">
    <animate attributeName="cy" values="300;280;300" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="310" r="2" fill="#90E0EF" opacity="0.3">
    <animate attributeName="cy" values="310;290;310" dur="5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="110" cy="305" r="2" fill="#48CAE4" opacity="0.3">
    <animate attributeName="cy" values="305;285;305" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- Gradients -->
  <defs>
    <linearGradient id="bodyGrad" x1="170" y1="240" x2="430" y2="320">
      <stop offset="0%" stop-color="#1A3C34"/>
      <stop offset="50%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1A3C34"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="200" y1="200" x2="400" y2="250">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#40916C"/>
    </linearGradient>
    <linearGradient id="solarGrad" x1="215" y1="175" x2="385" y2="203">
      <stop offset="0%" stop-color="#144272"/>
      <stop offset="50%" stop-color="#2C74B3"/>
      <stop offset="100%" stop-color="#144272"/>
    </linearGradient>
  </defs>
</svg>